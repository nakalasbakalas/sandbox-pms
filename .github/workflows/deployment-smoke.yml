name: Deployment Smoke

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deployment-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libpq-dev

      - name: Install dependencies
        run: pip install -r sandbox_pms_mvp/requirements-dev.txt

      - name: Run deployment smoke tests
        run: python -m pytest sandbox_pms_mvp/tests/test_deployment_cli.py -p no:cacheprovider -q
