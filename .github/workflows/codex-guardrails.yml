name: Codex Guardrails

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  quality-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libpq-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r sandbox_pms_mvp/requirements-dev.txt

      - name: Run placeholder check
        run: python scripts/check_placeholders.py

      - name: Run public surface check
        run: python scripts/check_public_surface.py

      - name: Run codex guardrail tests
        run: python -m pytest sandbox_pms_mvp/tests/test_codex_guardrails.py -q

      - name: Run full pytest suite
        run: python -m pytest sandbox_pms_mvp/tests/ -p no:cacheprovider -q
