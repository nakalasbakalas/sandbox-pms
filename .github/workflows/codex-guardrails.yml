name: Codex Guardrails

on:
  workflow_dispatch:

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # reduced from 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"  # Cache pip dependencies automatically

      - name: Install system dependencies
        run: sudo apt-get install -y libpq-dev  # Skip apt-get update (runners are fresh & updated)

      - name: Install dependencies
        run: pip install -r sandbox_pms_mvp/requirements-dev.txt

      - name: Run placeholder check
        run: python scripts/check_placeholders.py

      - name: Run public surface check
        run: python scripts/check_public_surface.py

      - name: Run full pytest suite
        run: python -m pytest sandbox_pms_mvp/tests/ -p no:cacheprovider -q
