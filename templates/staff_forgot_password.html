{% extends 'base.html' %}
{% block title %}Forgot password | {{ hotel_name }}{% endblock %}
{% block content %}
<section class="card narrow-card">
  <div class="card-head"><div><p class="eyebrow">Staff access</p><h1>Reset staff password</h1></div></div>
  <p>Enter your email or username. If the account exists, the system will queue a reset link.</p>
  <form class="stack-form" method="post">
    {{ csrf_input() }}
    <label><span>Email or username</span><input type="text" name="identifier" required></label>
    <button class="button" type="submit">Send reset link</button>
  </form>
</section>
{% endblock %}
