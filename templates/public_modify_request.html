{% extends 'base.html' %}
{% block title %}Modification request | {{ hotel_name }}{% endblock %}
{% block content %}
<section class="card">
  <div class="card-head"><div><p class="eyebrow">Guest self-service</p><h1>Modification request</h1></div></div>
  <form class="stack-form" method="post">
    {{ csrf_input() }}
    <div class="grid two">
      <label><span>Booking reference</span><input type="text" name="booking_reference" maxlength="20" required></label>
      <label><span>Email or mobile phone</span><input type="text" name="contact_value" required></label>
    </div>
    <div class="grid two">
      <label><span>Requested check-in</span><input type="date" name="requested_check_in"></label>
      <label><span>Requested check-out</span><input type="date" name="requested_check_out"></label>
    </div>
    <div class="grid two">
      <label><span>Requested adults</span><input type="number" name="requested_adults" min="1" max="3"></label>
      <label><span>Requested children</span><input type="number" name="requested_children" min="0" max="2"></label>
    </div>
    <label><span>Contact correction</span><input type="text" name="contact_correction" maxlength="255"></label>
    <label><span>Special request update</span><textarea name="special_requests" rows="4" maxlength="500"></textarea></label>
    <button class="button" type="submit">Submit request</button>
  </form>
  {% if request_row %}
    <div class="subsection"><p>Request {{ request_row.request_code }} recorded.</p></div>
  {% endif %}
</section>
{% endblock %}
