{% extends 'base.html' %}
{% block title %}Reset password | {{ hotel_name }}{% endblock %}
{% block content %}
<section class="card narrow-card">
  <div class="card-head"><div><p class="eyebrow">Staff security</p><h1>Choose a new password</h1></div></div>
  {% if error %}<p class="flash error">{{ error }}</p>{% endif %}
  <p>Use at least 12 characters. Long passphrases are supported.</p>
  <form class="stack-form" method="post">
    {{ csrf_input() }}
    <label><span>New password</span><input type="password" name="password" minlength="12" required></label>
    <button class="button" type="submit">Update password</button>
  </form>
</section>
{% endblock %}
