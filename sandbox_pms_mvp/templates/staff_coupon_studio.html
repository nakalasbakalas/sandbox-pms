<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>Coupon Studio | Sandbox Hotel PMS</title>
  <style>
    :root {
      --bg: #f4f5f7;
      --surface: #ffffff;
      --surface-2: #f8f9fb;
      --surface-3: #eef2f7;
      --text: #151924;
      --muted: #5f6876;
      --muted-2: #7f8897;
      --accent: #b76a2b;
      --accent-2: #d18b50;
      --accent-soft: rgba(209, 139, 80, .14);
      --line: rgba(21, 25, 36, .10);
      --shadow: 0 16px 34px rgba(15, 23, 42, .10);
      --shadow-soft: 0 10px 20px rgba(15, 23, 42, .08);
      --radius: 22px;
      --page-gap: 3mm;
      --page-height-safe: 279mm;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.45;
      min-height: 100vh;
    }
    button, input, select, textarea { font: inherit; color: inherit; }
    img { display: block; max-width: 100%; }

    .app { max-width: 1400px; margin: 0 auto; padding: 18px; }

    .header {
      margin-bottom: 24px;
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(255, 255, 255, .06), rgba(255, 255, 255, .03)), var(--surface);
      box-shadow: var(--shadow);
    }
    .header h1 { margin: 0 0 8px; font-size: 32px; line-height: 1.05; font-family: Georgia, "Times New Roman", serif; }
    .header p { margin: 0; color: var(--muted); }
    .headerActions { display: flex; gap: 10px; margin-top: 16px; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 44px;
      padding: 12px 16px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .6);
      color: var(--text);
      font-weight: 900;
      cursor: pointer;
      text-decoration: none;
      transition: transform .14s ease, box-shadow .14s ease;
      box-shadow: var(--shadow-soft);
    }
    .btn:hover { transform: translateY(-1px); }
    .btn.primary { border: none; background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff; }

    .container { display: grid; grid-template-columns: 1fr 320px; gap: 18px; align-items: start; }

    .editor {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
      padding: 24px;
    }
    .editor h2 { margin: 0 0 16px; font-size: 20px; }

    .field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .field label { font-size: 12px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); }
    .field input, .field textarea {
      width: 100%;
      padding: 12px 13px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--surface-3);
      color: var(--text);
      outline: none;
      font: inherit;
    }
    .field input:focus, .field textarea:focus { border-color: rgba(209, 139, 80, .42); box-shadow: 0 0 0 4px rgba(209, 139, 80, .14); }
    .field textarea { min-height: 100px; resize: vertical; }

    .sidebar {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
      padding: 20px;
    }
    .sidebar h3 { margin: 0 0 16px; font-size: 16px; }

    .previewSection { margin-bottom: 20px; }
    .previewLabel { font-size: 11px; font-weight: 900; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; display: block; }

    .couponPreview {
      position: relative;
      display: grid;
      grid-template-columns: 140px minmax(0, 1.5fr) 160px;
      gap: 14px;
      align-items: center;
      min-height: 140px;
      padding: 16px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: linear-gradient(90deg, rgba(183, 106, 43, .14), rgba(183, 106, 43, 0) 20%), linear-gradient(180deg, rgba(255, 255, 255, .04), rgba(255, 255, 255, .02)), var(--surface);
      box-shadow: var(--shadow-soft);
      overflow: hidden;
    }
    .couponPreview::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 6px;
      background: linear-gradient(180deg, var(--accent), var(--accent-2));
    }

    .couponImage {
      width: 100%;
      height: 110px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--surface-3);
      overflow: hidden;
      position: relative;
    }
    .couponImage img { width: 100%; height: 100%; object-fit: cover; }
    .logo-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      width: 40px;
      height: 40px;
      background: rgba(255, 255, 255, .95);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .15);
    }
    .logo-badge img { width: 100%; height: 100%; object-fit: contain; }

    .couponMain { min-width: 0; padding: 0 8px; }
    .couponTitle { font-size: 20px; line-height: 1.1; font-weight: 1000; color: var(--text); margin: 0 0 6px; }
    .couponTerms { margin: 0; color: var(--muted-2); font-size: 12px; line-height: 1.4; }

    .codeBox {
      display: grid;
      gap: 8px;
      justify-items: center;
      text-align: center;
      padding: 12px;
      border-radius: 12px;
      border: 1px dashed rgba(209, 139, 80, .42);
      background: rgba(255, 255, 255, .04);
    }
    .ctaTag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      min-width: 100px;
    }

    .printPreview {
      background: #fff;
      color: #111;
      border-radius: 16px;
      border: 1px solid rgba(0, 0, 0, .08);
      box-shadow: 0 12px 32px rgba(0, 0, 0, .12);
      padding: 8mm;
      aspect-ratio: 210 / 297;
      overflow: hidden;
      position: relative;
      margin-top: 12px;
    }
    .printPreview::before {
      content: "A4 • 5 per page";
      position: absolute;
      top: 6px;
      right: 10px;
      font-size: 10px;
      font-weight: 800;
      color: #888;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .printPage {
      height: 100%;
      display: grid;
      grid-template-rows: repeat(5, 1fr);
      gap: 3mm;
    }

    .printCoupon {
      position: relative;
      display: grid;
      grid-template-columns: 32mm minmax(0, 1fr) 36mm;
      gap: 3mm;
      align-items: center;
      padding: 3mm;
      border: 1px solid rgba(0, 0, 0, .10);
      border-radius: 4mm;
      background: #fff;
      color: #111;
      overflow: hidden;
      page-break-inside: avoid;
      break-inside: avoid;
    }
    .printCoupon::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 2.2mm;
      background: linear-gradient(180deg, var(--accent), var(--accent-2));
    }

    .printImage {
      width: 100%;
      height: 100%;
      min-height: 28mm;
      border-radius: 3mm;
      border: 1px solid rgba(0, 0, 0, .08);
      overflow: hidden;
      background: #f0f0f0;
      position: relative;
    }
    .printImage img { width: 100%; height: 100%; object-fit: cover; }
    .printLogo {
      position: absolute;
      top: 3mm;
      left: 3mm;
      width: 8mm;
      height: 8mm;
      background: rgba(255, 255, 255, .98);
      border-radius: 2mm;
      padding: 1mm;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .printLogo img { width: 100%; height: 100%; object-fit: contain; }

    .printMain { min-width: 0; padding: 0 1.5mm; }
    .printTitle { font-size: 13pt; line-height: 1.05; font-weight: 1000; margin: 0 0 1mm; color: #111; }
    .printTerms { font-size: 7.5pt; line-height: 1.3; margin: 0; color: #666; }

    .printCode {
      display: grid;
      gap: 1.2mm;
      justify-items: center;
      text-align: center;
      padding: 2mm;
      border-radius: 2.5mm;
      border: 1px dashed rgba(183, 106, 43, .35);
      background: #fffaf6;
    }
    .printCodeCta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 20mm;
      padding: 1.2mm 1.8mm;
      border-radius: 2mm;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      font-size: 6pt;
      font-weight: 900;
    }

    .muted { color: var(--muted); }
    .screenOnly { display: block; }
    .printOnly { display: none; }

    @media (max-width: 1024px) {
      .container { grid-template-columns: 1fr; }
    }
    @media (max-width: 768px) {
      .couponPreview { grid-template-columns: 1fr; }
      .couponImage { height: 160px; }
      .editor { padding: 16px; }
      .app { padding: 12px; }
    }

    @page { size: A4 portrait; margin: 8mm; }
    @media print {
      html, body { background: #fff !important; color: #111 !important; }
      .screenOnly, .app { display: none !important; }
      .printOnly { display: block !important; }
      .printRoot { display: block; }
      .printPages {
        display: grid;
        gap: 20mm;
      }
      .printPage {
        height: var(--page-height-safe);
        page-break-after: always;
        break-after: page;
      }
      .printPage:last-child { page-break-after: auto; break-after: auto; }
    }
  </style>
</head>
<body>
  <div class="app screenOnly">
    <div class="header">
      <h1>Coupon Studio</h1>
      <p>Edit your coupon and print it on A4 paper (5 coupons per page).</p>
      <div class="headerActions">
        <button class="btn primary" id="printBtn">Print coupon</button>
      </div>
    </div>

    <div class="container">
      <div class="editor">
        <h2>Edit Coupon</h2>

        <div class="field">
          <label for="titleInput">Coupon Title</label>
          <input id="titleInput" type="text" placeholder="Enter offer title">
        </div>

        <div class="field">
          <label for="termsInput">Terms & Conditions</label>
          <textarea id="termsInput" placeholder="Enter terms, conditions, or restrictions"></textarea>
        </div>

        <div class="field">
          <label for="ctaInput">CTA Button Text</label>
          <input id="ctaInput" type="text" placeholder="e.g., Book Now, Claim Offer" maxlength="24">
        </div>
      </div>

      <div class="sidebar">
        <h3>Preview</h3>

        <div class="previewSection">
          <span class="previewLabel">Live preview</span>
          <div id="livePreview"></div>
        </div>

        <div class="previewSection">
          <span class="previewLabel">Print preview (A4)</span>
          <div class="printPreview" id="printPreview"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="printOnly printRoot" id="printRoot"></div>

  <script>
    const STORAGE_KEY = "sandbox_coupon_studio_data";

    const defaultData = {
      title: "Direct Booking Advantage",
      terms: "Direct bookings only • Subject to availability • Limited time offer",
      cta: "Book Direct"
    };

    let data = loadData();

    const titleInput = document.getElementById('titleInput');
    const termsInput = document.getElementById('termsInput');
    const ctaInput = document.getElementById('ctaInput');
    const livePreview = document.getElementById('livePreview');
    const printPreview = document.getElementById('printPreview');
    const printBtn = document.getElementById('printBtn');
    const printRoot = document.getElementById('printRoot');

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return structuredClone(defaultData);
        return {...defaultData, ...JSON.parse(raw)};
      } catch (err) {
        return structuredClone(defaultData);
      }
    }

    function saveData() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      } catch (err) {}
    }

    function escapeHtml(str) {
      return String(str ?? '').replace(/[&<>"']/g, s => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[s]));
    }

    function renderLivePreview() {
      livePreview.innerHTML = `
        <div class="couponPreview">
          <div class="couponImage">
            <img src="/static/branding/sandbox-hotel-nakhon-si-thammarat-Sandbox-Hotel-Hero-Banner.png" alt="Hotel">
            <div class="logo-badge">
              <img src="/static/branding/sandbox-hotel-logo-256.webp" alt="Logo">
            </div>
          </div>
          <div class="couponMain">
            <h3 class="couponTitle">${escapeHtml(data.title)}</h3>
            <p class="couponTerms">${escapeHtml(data.terms)}</p>
          </div>
          <div class="codeBox">
            <span class="ctaTag">${escapeHtml(data.cta || "Claim Offer")}</span>
          </div>
        </div>
      `;
    }

    function renderPrintPreview() {
      printPreview.innerHTML = `
        <div class="printPage">
          ${Array(5).fill(0).map(() => `
            <div class="printCoupon">
              <div class="printImage">
                <img src="/static/branding/sandbox-hotel-nakhon-si-thammarat-Sandbox-Hotel-Hero-Banner.png" alt="Hotel">
                <div class="printLogo">
                  <img src="/static/branding/sandbox-hotel-logo-256.webp" alt="Logo">
                </div>
              </div>
              <div class="printMain">
                <h4 class="printTitle">${escapeHtml(data.title)}</h4>
                <p class="printTerms">${escapeHtml(data.terms)}</p>
              </div>
              <div class="printCode">
                <span class="printCodeCta">${escapeHtml(data.cta || "Claim")}</span>
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderPrintPages() {
      printRoot.innerHTML = `
        <div class="printPages">
          <div class="printPage">
            ${Array(5).fill(0).map(() => `
              <div class="printCoupon">
                <div class="printImage">
                  <img src="/static/branding/sandbox-hotel-nakhon-si-thammarat-Sandbox-Hotel-Hero-Banner.png" alt="Hotel">
                  <div class="printLogo">
                    <img src="/static/branding/sandbox-hotel-logo-256.webp" alt="Logo">
                  </div>
                </div>
                <div class="printMain">
                  <h4 class="printTitle">${escapeHtml(data.title)}</h4>
                  <p class="printTerms">${escapeHtml(data.terms)}</p>
                </div>
                <div class="printCode">
                  <span class="printCodeCta">${escapeHtml(data.cta || "Claim")}</span>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    function renderAll() {
      renderLivePreview();
      renderPrintPreview();
      renderPrintPages();
      saveData();
    }

    function updateData(fields) {
      data = {...data, ...fields};
      renderAll();
    }

    titleInput.addEventListener('input', e => updateData({title: e.target.value}));
    termsInput.addEventListener('input', e => updateData({terms: e.target.value}));
    ctaInput.addEventListener('input', e => updateData({cta: e.target.value}));

    printBtn.addEventListener('click', () => {
      renderPrintPages();
      window.print();
    });

    window.addEventListener('beforeprint', renderPrintPages);

    // Initialize
    titleInput.value = data.title;
    termsInput.value = data.terms;
    ctaInput.value = data.cta;
    renderAll();
  </script>
</body>
</html>
