<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Sandbox Hotel share image</title>
  <desc id="desc">Brand share image for hotel search and booking pages.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0c10"/>
      <stop offset="100%" stop-color="#11324d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c57c35"/>
      <stop offset="100%" stop-color="#9d5820"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="170" cy="120" r="180" fill="#c57c35" fill-opacity="0.12"/>
  <circle cx="1030" cy="520" r="220" fill="#f0c89a" fill-opacity="0.08"/>
  <rect x="90" y="120" width="126" height="126" rx="30" fill="url(#accent)"/>
  <text x="153" y="198" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="48" font-weight="700" fill="#ffffff">SBX</text>
  <text x="90" y="320" font-family="Segoe UI, Arial, sans-serif" font-size="72" font-weight="700" fill="#eef2f7">Sandbox Hotel</text>
  <text x="90" y="390" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#d7dee8">Direct booking. Secure guest links. Multilingual reservation flow.</text>
  <text x="90" y="450" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#f0c89a">Search availability, confirm stays, and manage guest requests.</text>
</svg>
