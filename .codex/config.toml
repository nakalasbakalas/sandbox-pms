# Sandbox Hotel PMS Codex project config
# Keep commands aligned with the repo's actual Python toolchain.

project_root_markers = [".git"]

[ui]
hide_agent_reasoning = true

[history]
persist = true

[tools]
web_search = true

[commands]
test = "python -m pytest"
guardrails = "python -m pytest sandbox_pms_mvp/tests/test_codex_guardrails.py -q"
placeholders = "python scripts/check_placeholders.py"
public_surface = "python scripts/check_public_surface.py"
launch_gate = "python scripts/launch_gate.py"
launch_gate_strict = "python scripts/launch_gate.py --strict-launch"

[profiles.default]
approval_policy = "on-request"
sandbox_mode = "workspace-write"

[profiles.review]
approval_policy = "on-request"
sandbox_mode = "read-only"

[profiles.refactor]
approval_policy = "on-request"
sandbox_mode = "workspace-write"
