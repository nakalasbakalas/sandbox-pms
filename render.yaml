services:
  - type: web
    name: sandbox-hotel-pms
    runtime: node
    plan: starter
    buildCommand: npm ci --include=dev && npm run db:generate && npm run build
    preDeployCommand: npm run db:migrate && npm run db:seed
    startCommand: npm run start
    healthCheckPath: /healthz
    autoDeploy: false
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_PMS_API_MODE
        value: server
      - key: APP_URL
        value: https://book.sandboxhotel.com
      - key: ALLOWED_ORIGINS
        value: https://book.sandboxhotel.com,https://sandbox-hotel-pms-v43m.onrender.com,https://sandbox-hotel-pms.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: sandbox-hotel-pms-db-v43m
          property: connectionString
      - key: SEED_MODE
        value: prod-safe
      - key: SESSION_SECRET
        generateValue: true
      - key: SEED_USERS_JSON
        sync: false
      - key: SEED_ADMIN_EMAIL
        sync: false
      - key: SEED_ADMIN_PASSWORD_HASH
        sync: false
      - key: SEED_ADMIN_PASSWORD
        sync: false
      - key: SEED_USER_PASSWORD_HASH
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false

databases:
  - name: sandbox-hotel-pms-db-v43m
    databaseName: sandbox_hotel_pms
    plan: basic-256mb
