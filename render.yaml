services:
  - type: web
    name: sandbox-hotel-pms
    env: python
    region: oregon
    plan: standard
    pythonVersion: 3.11
    rootDir: sandbox_pms_mvp
    
    buildCommand: >
      pip install --upgrade pip &&
      pip install -r requirements.txt &&
      flask db upgrade
    
    startCommand: >
      gunicorn -w 4 -b 0.0.0.0:10000 -t 120 -k sync --access-logfile - --error-logfile - app:app
    
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: FLASK_ENV
        value: production
      - fromGroup: sandbox-hotel-pms-env
